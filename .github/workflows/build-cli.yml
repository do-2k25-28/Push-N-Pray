name: Build and release

on:
  pull_request:
    branches:
      - main
    paths:
      - cmd/cli/**
      - internal/**
      - go.mod
      - go.sum
      - Makefile
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-cli:
    name: build cli
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: build cli
        run: make build-cli
